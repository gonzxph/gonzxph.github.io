<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Deep Link PoC</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
</head>
<body>
  <h3>Deep Link PoC</h3>
  <p>If the app is installed, the link below should open it. If not, you'll stay here.</p>
  <a id="manual" href="sa187d8f14://7000?url=https://gonzxph.github.io/deeplink.html">Open app (click if auto-open fails)</a>

  <script>
    (function(){
      var target = 'sa187d8f14://7000?url=' + encodeURIComponent('https://gonzxph.github.io/deeplink.html');

      function tryOpen() {
        // Primary: navigate (may require user gesture in some browsers)
        window.location = target;

        // Fallback: hidden iframe (older Android webviews/browsers)
        var ifr = document.createElement('iframe');
        ifr.style.display = 'none';
        ifr.src = target;
        document.body.appendChild(ifr);
        setTimeout(function(){ try { document.body.removeChild(ifr); } catch(e){} }, 1200);
      }

      // Auto-trigger after a short delay; user can also click the link.
      window.addEventListener('load', function(){
        setTimeout(tryOpen, 300);
      }, false);
    })();
  </script>
</body>
</html>
