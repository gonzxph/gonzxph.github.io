<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSCodec — PowerShell Encoder / Decoder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0c10;
    --surface:   #0f1318;
    --panel:     #141920;
    --border:    #1e2730;
    --border2:   #2a3540;
    --accent:    #00e5ff;
    --accent2:   #7c3aed;
    --accent3:   #10b981;
    --danger:    #ef4444;
    --warn:      #f59e0b;
    --text:      #e2e8f0;
    --muted:     #64748b;
    --mono:      'Share Tech Mono', monospace;
    --sans:      'Syne', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,229,255,0.012) 2px,
      rgba(0,229,255,0.012) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* Grid bg */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px 60px;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 44px; height: 44px;
    border: 1.5px solid var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .logo-icon::before {
    content: 'PS';
    font-family: var(--mono);
    font-size: 14px;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .logo-icon::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0,229,255,0.06);
  }

  .logo-text {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .logo-title {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.5px;
    line-height: 1;
  }

  .logo-title span { color: var(--accent); }

  .logo-sub {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .header-badges {
    display: flex;
    gap: 8px;
  }

  .badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 4px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .badge-cyan  { border: 1px solid rgba(0,229,255,0.4); color: var(--accent); background: rgba(0,229,255,0.07); }
  .badge-green { border: 1px solid rgba(16,185,129,0.4); color: var(--accent3); background: rgba(16,185,129,0.07); }

  /* ── MODE SELECTOR ── */
  .mode-bar {
    display: flex;
    gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 28px;
    width: fit-content;
  }

  .mode-btn {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    padding: 9px 22px;
    border-radius: 7px;
    border: none;
    cursor: pointer;
    transition: all .2s;
    color: var(--muted);
    background: transparent;
    letter-spacing: 0.2px;
  }

  .mode-btn.active {
    background: var(--panel);
    color: var(--accent);
    border: 1px solid var(--border2);
    box-shadow: 0 0 12px rgba(0,229,255,0.08);
  }

  .mode-btn:hover:not(.active) { color: var(--text); }

  /* ── MAIN LAYOUT ── */
  .codec-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  @media (max-width: 700px) {
    .codec-grid { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }

  .panel-label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .dot-cyan   { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .dot-purple { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }
  .dot-green  { background: var(--accent3); box-shadow: 0 0 8px var(--accent3); }
  .dot-warn   { background: var(--warn); box-shadow: 0 0 8px var(--warn); }

  .panel-actions {
    display: flex;
    gap: 6px;
  }

  .icon-btn {
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 5px 10px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    transition: all .15s;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .icon-btn:hover { color: var(--text); border-color: var(--border2); background: rgba(255,255,255,0.04); }
  .icon-btn.danger:hover { color: var(--danger); border-color: var(--danger); }

  .panel-body {
    flex: 1;
    position: relative;
  }

  textarea {
    width: 100%;
    height: 220px;
    background: transparent;
    border: none;
    padding: 16px 18px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    resize: vertical;
    outline: none;
    line-height: 1.7;
    caret-color: var(--accent);
  }

  textarea::placeholder { color: var(--muted); opacity: 0.6; }
  textarea:focus { background: rgba(0,229,255,0.02); }

  .char-count {
    position: absolute;
    bottom: 8px;
    right: 12px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    pointer-events: none;
  }

  /* ── CONTROLS ── */
  .controls-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .run-btn {
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 700;
    padding: 12px 32px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all .2s;
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.3px;
    position: relative;
    overflow: hidden;
  }

  .run-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.08);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform .2s;
    border-radius: inherit;
  }

  .run-btn:hover::before { transform: scaleX(1); }

  .run-btn-decode {
    background: rgba(0,229,255,0.12);
    color: var(--accent);
    border: 1.5px solid rgba(0,229,255,0.5);
  }

  .run-btn-encode {
    background: rgba(124,58,237,0.12);
    color: #a78bfa;
    border: 1.5px solid rgba(124,58,237,0.5);
  }

  .run-btn:active { transform: scale(0.97); }

  .swap-btn {
    font-family: var(--mono);
    font-size: 12px;
    padding: 11px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
    letter-spacing: 0.5px;
  }

  .swap-btn:hover { color: var(--text); border-color: var(--border2); background: rgba(255,255,255,0.07); }

  .encoding-select {
    font-family: var(--mono);
    font-size: 12px;
    padding: 11px 14px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    outline: none;
    letter-spacing: 0.5px;
  }

  .encoding-select:focus { border-color: rgba(0,229,255,0.5); }

  /* ── ANALYSIS PANEL ── */
  .analysis-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  .analysis-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    cursor: pointer;
    user-select: none;
  }

  .analysis-title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--warn);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .analysis-toggle {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    transition: transform .2s;
  }

  .analysis-body {
    padding: 16px 18px;
    display: none;
  }

  .analysis-body.open { display: block; }

  .threat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 10px;
    margin-bottom: 14px;
  }

  .threat-item {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .threat-item.found {
    border-color: rgba(239,68,68,0.35);
    background: rgba(239,68,68,0.06);
  }

  .threat-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .threat-item.found .threat-label { color: var(--danger); }

  .threat-status {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    margin-left: auto;
  }

  .status-clear  { background: rgba(16,185,129,0.12); color: var(--accent3); }
  .status-found  { background: rgba(239,68,68,0.12); color: var(--danger); }
  .status-warn   { background: rgba(245,158,11,0.12); color: var(--warn); }

  /* ── HISTORY ── */
  .history-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .history-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }

  .history-title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent3);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .history-list {
    max-height: 240px;
    overflow-y: auto;
  }

  .history-list::-webkit-scrollbar { width: 4px; }
  .history-list::-webkit-scrollbar-track { background: transparent; }
  .history-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .history-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 18px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background .15s;
  }

  .history-item:last-child { border-bottom: none; }
  .history-item:hover { background: rgba(255,255,255,0.025); }

  .history-op {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  .op-decode { background: rgba(0,229,255,0.1); color: var(--accent); }
  .op-encode { background: rgba(124,58,237,0.1); color: #a78bfa; }

  .history-preview {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }

  .history-time {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    opacity: 0.5;
    flex-shrink: 0;
  }

  .empty-state {
    padding: 32px 18px;
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: var(--panel);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    z-index: 10000;
    transform: translateY(20px);
    opacity: 0;
    transition: all .3s;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    letter-spacing: 0.5px;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: rgba(16,185,129,0.5); }
  .toast.error   { border-color: rgba(239,68,68,0.5); }

  .toast-dot {
    width: 6px; height: 6px; border-radius: 50%;
  }

  .toast.success .toast-dot { background: var(--accent3); }
  .toast.error   .toast-dot { background: var(--danger); }

  /* ── FOOTER ── */
  footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 0 0;
    border-top: 1px solid var(--border);
    margin-top: 28px;
  }

  .footer-text {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .footer-links {
    display: flex;
    gap: 16px;
  }

  .footer-links a {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    transition: color .15s;
  }

  .footer-links a:hover { color: var(--accent); }

  /* ── STATUS BAR ── */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 8px 18px;
    border-top: 1px solid var(--border);
    background: var(--panel);
  }

  .status-item {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.5px;
  }

  .status-val { color: var(--text); }
</style>
</head>
<body>

<div class="wrap">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon"></div>
      <div class="logo-text">
        <div class="logo-title">PS<span>Codec</span></div>
        <div class="logo-sub">PowerShell Encoder &amp; Decoder</div>
      </div>
    </div>
    <div class="header-badges">
      <span class="badge badge-cyan">Base64</span>
      <span class="badge badge-green">UTF-16LE</span>
    </div>
  </header>

  <!-- MODE BAR -->
  <div class="mode-bar">
    <button class="mode-btn active" id="btn-decode" onclick="setMode('decode')">⟵ Decode</button>
    <button class="mode-btn" id="btn-encode" onclick="setMode('encode')">Encode ⟶</button>
    <button class="mode-btn" id="btn-both"   onclick="setMode('both')">⇄ Both</button>
  </div>

  <!-- MAIN CODEC PANELS -->
  <div class="codec-grid">
    <!-- INPUT -->
    <div class="panel" id="panel-input">
      <div class="panel-header">
        <div class="panel-label">
          <div class="dot dot-cyan" id="input-dot"></div>
          <span id="input-label">ENCODED INPUT</span>
        </div>
        <div class="panel-actions">
          <button class="icon-btn" onclick="pasteInput()" title="Paste from clipboard">PASTE</button>
          <button class="icon-btn" onclick="loadSample()" title="Load a sample">SAMPLE</button>
          <button class="icon-btn danger" onclick="clearInput()" title="Clear">CLR</button>
        </div>
      </div>
      <div class="panel-body">
        <textarea id="input-area" placeholder="Paste encoded PowerShell command here...
e.g. powershell -EncodedCommand JABj..."></textarea>
        <div class="char-count" id="input-count">0 chars</div>
      </div>
      <div class="status-bar">
        <div class="status-item">TYPE <span class="status-val" id="input-type">—</span></div>
        <div class="status-item">LENGTH <span class="status-val" id="input-len">0</span></div>
        <div class="status-item">LINES <span class="status-val" id="input-lines">0</span></div>
      </div>
    </div>

    <!-- OUTPUT -->
    <div class="panel" id="panel-output">
      <div class="panel-header">
        <div class="panel-label">
          <div class="dot dot-purple" id="output-dot"></div>
          <span id="output-label">DECODED OUTPUT</span>
        </div>
        <div class="panel-actions">
          <button class="icon-btn" onclick="copyOutput()" title="Copy output">COPY</button>
          <button class="icon-btn danger" onclick="clearOutput()" title="Clear">CLR</button>
        </div>
      </div>
      <div class="panel-body">
        <textarea id="output-area" placeholder="Output will appear here..." readonly></textarea>
        <div class="char-count" id="output-count">0 chars</div>
      </div>
      <div class="status-bar">
        <div class="status-item">TYPE <span class="status-val" id="output-type">—</span></div>
        <div class="status-item">LENGTH <span class="status-val" id="output-len">0</span></div>
        <div class="status-item">LINES <span class="status-val" id="output-lines">0</span></div>
      </div>
    </div>
  </div>

  <!-- CONTROLS ROW -->
  <div class="controls-row">
    <button class="run-btn run-btn-decode" id="main-action" onclick="runAction()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M5 3l6 5-6 5V3z"/></svg>
      <span id="action-label">DECODE</span>
    </button>

    <button class="swap-btn" onclick="swapPanels()" title="Swap input and output">⇄ SWAP</button>

    <select class="encoding-select" id="encoding-select">
      <option value="utf16le">UTF-16LE (Standard PS)</option>
      <option value="utf8">UTF-8</option>
      <option value="ascii">ASCII</option>
    </select>

    <button class="icon-btn" onclick="wrapCommand()" style="margin-left:auto;" title="Wrap output in powershell command">WRAP CMD</button>
    <button class="icon-btn" onclick="stripCommand()" title="Strip powershell prefix">STRIP PREFIX</button>
  </div>

  <!-- THREAT ANALYSIS -->
  <div class="analysis-panel">
    <div class="analysis-header" onclick="toggleAnalysis()">
      <div class="analysis-title">
        <div class="dot dot-warn"></div>
        THREAT ANALYSIS
        <span id="threat-summary" style="font-size:10px; color: var(--muted);">— run decode to analyse</span>
      </div>
      <span class="analysis-toggle" id="analysis-arrow">▼</span>
    </div>
    <div class="analysis-body" id="analysis-body">
      <div class="threat-grid" id="threat-grid">
        <!-- populated by JS -->
      </div>
      <div id="ioc-section" style="display:none;">
        <div style="font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 1.5px; margin-bottom: 8px; text-transform: uppercase;">Extracted Indicators</div>
        <div id="ioc-list" style="font-family: var(--mono); font-size: 12px; color: var(--text); line-height: 1.9;"></div>
      </div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="history-panel">
    <div class="history-header">
      <div class="history-title">
        <div class="dot dot-green"></div>
        SESSION HISTORY
      </div>
      <button class="icon-btn danger" onclick="clearHistory()">CLR ALL</button>
    </div>
    <div class="history-list" id="history-list">
      <div class="empty-state" id="history-empty">// no operations yet</div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <span class="footer-text">PSCodec v1.0 — Forensics &amp; IR Toolkit</span>
    <div class="footer-links">
      <a href="https://github.com" target="_blank">GitHub</a>
      <a href="#" onclick="showAbout(); return false;">About</a>
    </div>
  </footer>

</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <div class="toast-dot"></div>
  <span id="toast-msg"></span>
</div>

<script>
let mode = 'decode';
let history = [];
let analysisOpen = false;

const THREATS = [
  { key: 'iex',         label: 'IEX / Invoke-Expr',      regex: /iex|invoke-expression/i },
  { key: 'download',    label: 'Download Cradle',         regex: /downloadstring|downloadfile|webclient|webrequest|curl|wget|bits/i },
  { key: 'bypass',      label: 'AMSI / UAC Bypass',       regex: /amsi|bypass|disablerealtimeprotection|set-mppreference|uac/i },
  { key: 'exec',        label: 'Remote Exec',             regex: /invoke-command|psexec|wmi|winrm|enter-pssession/i },
  { key: 'obfuscation', label: 'Obfuscation',             regex: /\[char\]|join.*split|replace.*\(|str.*reverse|xor/i },
  { key: 'persistence', label: 'Persistence',             regex: /schtasks|reg\s+add|registrykey|startup|run\s+key|taskscheduler/i },
  { key: 'exfil',       label: 'Data Exfil',              regex: /compress|zip|tar|upload|post.*http|send.*data/i },
  { key: 'creds',       label: 'Credential Access',       regex: /sekurlsa|mimikatz|lsass|credential|getpassword|netuse/i },
];

const URL_RE   = /https?:\/\/[^\s'"]+/gi;
const IP_RE    = /\b(?:\d{1,3}\.){3}\d{1,3}\b/g;
const PATH_RE  = /[A-Za-z]:\\[^\s'"<>]+/g;
const PIPE_RE  = /\|/g;

function setMode(m) {
  mode = m;
  ['decode','encode','both'].forEach(x => document.getElementById('btn-'+x).classList.toggle('active', x === m));

  if (m === 'decode') {
    document.getElementById('input-label').textContent  = 'ENCODED INPUT';
    document.getElementById('output-label').textContent = 'DECODED OUTPUT';
    document.getElementById('input-dot').className      = 'dot dot-cyan';
    document.getElementById('output-dot').className     = 'dot dot-purple';
    document.getElementById('action-label').textContent = 'DECODE';
    document.getElementById('main-action').className    = 'run-btn run-btn-decode';
    document.getElementById('output-area').readOnly     = true;
    document.getElementById('input-area').placeholder   = 'Paste encoded PowerShell command here...\ne.g. powershell -EncodedCommand JABj...';
  } else if (m === 'encode') {
    document.getElementById('input-label').textContent  = 'PLAINTEXT INPUT';
    document.getElementById('output-label').textContent = 'ENCODED OUTPUT';
    document.getElementById('input-dot').className      = 'dot dot-purple';
    document.getElementById('output-dot').className     = 'dot dot-cyan';
    document.getElementById('action-label').textContent = 'ENCODE';
    document.getElementById('main-action').className    = 'run-btn run-btn-encode';
    document.getElementById('output-area').readOnly     = true;
    document.getElementById('input-area').placeholder   = 'Enter plaintext PowerShell command to encode...\ne.g. Get-Process | Select-Object Name, CPU';
  } else {
    document.getElementById('input-label').textContent  = 'ENCODED INPUT';
    document.getElementById('output-label').textContent = 'DECODED OUTPUT';
    document.getElementById('input-dot').className      = 'dot dot-cyan';
    document.getElementById('output-dot').className     = 'dot dot-green';
    document.getElementById('action-label').textContent = 'DECODE + ENCODE';
    document.getElementById('main-action').className    = 'run-btn run-btn-decode';
    document.getElementById('output-area').readOnly     = true;
    document.getElementById('input-area').placeholder   = 'Paste encoded PowerShell command here...';
  }
}

function getEncoding() {
  return document.getElementById('encoding-select').value;
}

function extractBase64(raw) {
  // strip powershell -enc / -encodedcommand prefix
  const m = raw.match(/(?:-e(?:nc(?:odedcommand)?)?)\s+([A-Za-z0-9+/=]+)/i);
  if (m) return m[1];
  // if raw looks like pure base64
  const trimmed = raw.trim().replace(/\s+/g, '');
  if (/^[A-Za-z0-9+/=]+$/.test(trimmed)) return trimmed;
  return raw.trim();
}

function decode(raw) {
  const b64 = extractBase64(raw);
  const enc = getEncoding();
  try {
    const bin = atob(b64);
    if (enc === 'utf16le') {
      let out = '';
      for (let i = 0; i < bin.length - 1; i += 2) {
        const cp = bin.charCodeAt(i) | (bin.charCodeAt(i+1) << 8);
        out += String.fromCharCode(cp);
      }
      return out;
    } else {
      return decodeURIComponent(escape(bin));
    }
  } catch(e) {
    throw new Error('Invalid base64 or encoding mismatch: ' + e.message);
  }
}

function encode(plain) {
  const enc = getEncoding();
  try {
    if (enc === 'utf16le') {
      let bin = '';
      for (let i = 0; i < plain.length; i++) {
        const c = plain.charCodeAt(i);
        bin += String.fromCharCode(c & 0xFF, (c >> 8) & 0xFF);
      }
      return btoa(bin);
    } else {
      return btoa(unescape(encodeURIComponent(plain)));
    }
  } catch(e) {
    throw new Error('Encoding failed: ' + e.message);
  }
}

function runAction() {
  const input = document.getElementById('input-area').value.trim();
  if (!input) { showToast('Input is empty', 'error'); return; }

  try {
    let result;
    let opType;
    if (mode === 'decode') {
      result = decode(input);
      opType = 'decode';
      document.getElementById('output-area').value = result;
      runAnalysis(result);
      showToast('Decoded successfully', 'success');
    } else if (mode === 'encode') {
      result = encode(input);
      opType = 'encode';
      document.getElementById('output-area').value = result;
      clearAnalysis();
      showToast('Encoded successfully', 'success');
    } else {
      result = decode(input);
      opType = 'decode';
      document.getElementById('output-area').value = result;
      runAnalysis(result);
      showToast('Decoded successfully', 'success');
    }
    addHistory(opType, input, result);
    updateStats();
  } catch(e) {
    showToast(e.message, 'error');
    document.getElementById('output-area').value = '// Error: ' + e.message;
  }
}

function runAnalysis(text) {
  const grid = document.getElementById('threat-grid');
  grid.innerHTML = '';
  let totalFound = 0;

  THREATS.forEach(t => {
    const found = t.regex.test(text);
    if (found) totalFound++;
    const div = document.createElement('div');
    div.className = 'threat-item' + (found ? ' found' : '');
    div.innerHTML = `
      <div class="dot ${found ? 'dot-danger' : ''}" style="background:${found ? 'var(--danger)' : 'var(--border2)'}; flex-shrink:0;"></div>
      <span class="threat-label">${t.label}</span>
      <span class="threat-status ${found ? 'status-found' : 'status-clear'}">${found ? 'FOUND' : 'CLEAR'}</span>
    `;
    grid.appendChild(div);
  });

  // Extract IOCs
  const urls  = text.match(URL_RE)  || [];
  const ips   = text.match(IP_RE)   || [];
  const paths = text.match(PATH_RE) || [];

  const iocSection = document.getElementById('ioc-section');
  const iocList    = document.getElementById('ioc-list');

  if (urls.length || ips.length || paths.length) {
    iocSection.style.display = 'block';
    let html = '';
    if (urls.length)  html += urls.map(u  => `<div style="color:var(--danger)">🔗 ${u}</div>`).join('');
    if (ips.length)   html += ips.map(ip  => `<div style="color:var(--warn)">🌐 ${ip}</div>`).join('');
    if (paths.length) html += paths.map(p => `<div style="color:var(--muted)">📂 ${p}</div>`).join('');
    iocList.innerHTML = html;
  } else {
    iocSection.style.display = 'none';
  }

  const summary = document.getElementById('threat-summary');
  if (totalFound === 0) {
    summary.textContent = '— no threats detected';
    summary.style.color = 'var(--accent3)';
  } else {
    summary.textContent = `— ${totalFound} indicator${totalFound>1?'s':''} detected`;
    summary.style.color = 'var(--danger)';
  }

  if (!analysisOpen) { toggleAnalysis(); }
}

function clearAnalysis() {
  document.getElementById('threat-grid').innerHTML = '';
  document.getElementById('threat-summary').textContent = '— run decode to analyse';
  document.getElementById('threat-summary').style.color = 'var(--muted)';
  document.getElementById('ioc-section').style.display = 'none';
}

function toggleAnalysis() {
  analysisOpen = !analysisOpen;
  document.getElementById('analysis-body').classList.toggle('open', analysisOpen);
  document.getElementById('analysis-arrow').textContent = analysisOpen ? '▲' : '▼';
}

function addHistory(op, input, output) {
  const ts = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  history.unshift({ op, input: input.substring(0, 80), output, ts });
  if (history.length > 20) history.pop();
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('history-list');
  const empty = document.getElementById('history-empty');
  if (history.length === 0) {
    empty.style.display = 'block';
    list.querySelectorAll('.history-item').forEach(e => e.remove());
    return;
  }
  empty.style.display = 'none';
  list.querySelectorAll('.history-item').forEach(e => e.remove());

  history.forEach((h, i) => {
    const div = document.createElement('div');
    div.className = 'history-item';
    div.innerHTML = `
      <span class="history-op op-${h.op}">${h.op.toUpperCase()}</span>
      <span class="history-preview">${h.input.replace(/</g,'&lt;')}</span>
      <span class="history-time">${h.ts}</span>
    `;
    div.onclick = () => loadHistoryItem(i);
    list.appendChild(div);
  });
}

function loadHistoryItem(i) {
  const h = history[i];
  document.getElementById('input-area').value  = h.input;
  document.getElementById('output-area').value = h.output;
  updateStats();
  showToast('History item loaded', 'success');
}

function clearHistory() {
  history = [];
  renderHistory();
  showToast('History cleared', 'success');
}

function updateStats() {
  const inp = document.getElementById('input-area').value;
  const out = document.getElementById('output-area').value;

  document.getElementById('input-count').textContent  = inp.length + ' chars';
  document.getElementById('output-count').textContent = out.length + ' chars';

  document.getElementById('input-len').textContent  = inp.length;
  document.getElementById('output-len').textContent = out.length;
  document.getElementById('input-lines').textContent  = inp ? inp.split('\n').length : 0;
  document.getElementById('output-lines').textContent = out ? out.split('\n').length : 0;

  const detectType = (s) => {
    if (!s.trim()) return '—';
    const b64 = s.replace(/\s+/g,'');
    if (/^[A-Za-z0-9+/=]{20,}$/.test(b64)) return 'BASE64';
    if (s.includes('\x00')) return 'BINARY';
    if (s.includes('\n') || s.includes(';')) return 'PS SCRIPT';
    return 'TEXT';
  };
  document.getElementById('input-type').textContent  = detectType(inp);
  document.getElementById('output-type').textContent = detectType(out);
}

function clearInput()  { document.getElementById('input-area').value = ''; updateStats(); clearAnalysis(); }
function clearOutput() { document.getElementById('output-area').value = ''; updateStats(); }

function copyOutput() {
  const val = document.getElementById('output-area').value;
  if (!val) { showToast('Nothing to copy', 'error'); return; }
  navigator.clipboard.writeText(val).then(() => showToast('Copied to clipboard', 'success'));
}

function swapPanels() {
  const inp = document.getElementById('input-area').value;
  const out = document.getElementById('output-area').value;
  document.getElementById('input-area').value  = out;
  document.getElementById('output-area').value = inp;
  updateStats();
  showToast('Panels swapped', 'success');
}

function wrapCommand() {
  const out = document.getElementById('output-area').value.trim();
  if (!out) { showToast('No output to wrap', 'error'); return; }
  const wrapped = 'powershell -NoProfile -NonInteractive -EncodedCommand ' + out;
  document.getElementById('output-area').value = wrapped;
  updateStats();
  showToast('Command wrapped', 'success');
}

function stripCommand() {
  let val = document.getElementById('input-area').value;
  val = val.replace(/^.*?(?:-e(?:nc(?:odedcommand)?)?)\s+/i, '').trim();
  document.getElementById('input-area').value = val;
  updateStats();
  showToast('Prefix stripped', 'success');
}

function pasteInput() {
  navigator.clipboard.readText().then(t => {
    document.getElementById('input-area').value = t;
    updateStats();
    showToast('Pasted from clipboard', 'success');
  }).catch(() => showToast('Clipboard access denied', 'error'));
}

function loadSample() {
  // real encoded sample: Write-Host "PSCodec Sample" -ForegroundColor Cyan; Get-Process | Select-Object Name, CPU | Sort-Object CPU -Descending
  const sample = 'powershell -NonInteractive -EncodedCommand VwByAGkAdABlAC0ASABvAHMAdAAgACIAUABTAEMAbwBkAGUAYwAgAFMAYQBtAHAAbABlACIAIAAtAEYAbwByAGUAZwByAG8AdQBuAGQAQwBvAGwAbwByACAAQwB5AGEAbgA7ACAARwBlAHQALQBQAHIAbwBjAGUAcwBzACAAfAAgAFMAZQBsAGUAYwB0AC0ATwBiAGoAZQBjAHQAIABOAGEAbQBlACwAIABDAFAAVQAgAHwAIABTAG8AcgB0AC0ATwBiAGoAZQBjAHQAIABDAFAAVQAgAC0ARABlAHMAYwBlAG4AZABpAG4AZwA=';
  document.getElementById('input-area').value = sample;
  setMode('decode');
  updateStats();
  showToast('Sample loaded — hit DECODE', 'success');
}

let toastTimer;
function showToast(msg, type = 'success') {
  const el = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  el.className = 'toast ' + type;
  void el.offsetWidth;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

function showAbout() {
  showToast('PSCodec v1.0 — by your GitHub', 'success');
}

// Live stats on input
document.getElementById('input-area').addEventListener('input', updateStats);

// Init threat grid with blanks
(function initGrid() {
  const grid = document.getElementById('threat-grid');
  THREATS.forEach(t => {
    const div = document.createElement('div');
    div.className = 'threat-item';
    div.innerHTML = `<div class="dot" style="background:var(--border2); flex-shrink:0;"></div>
      <span class="threat-label">${t.label}</span>
      <span class="threat-status status-warn">—</span>`;
    grid.appendChild(div);
  });
  renderHistory();
})();
</script>
